name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'training-app/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: training-app/package-lock.json

      - name: Install dependencies
        run: cd training-app && npm ci

      - name: Build
        run: cd training-app && VITE_DEPLOY_TARGET=gh-pages VITE_API_URL=https://football-training-assistant.onrender.com npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./training-app/dist
          destination_dir: football-training-assistant