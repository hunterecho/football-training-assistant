name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'training-app/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: training-app/package-lock.json

      - name: Install dependencies
        run: cd training-app && npm ci

      - name: Build
        run: cd training-app && VITE_DEPLOY_TARGET=gh-pages VITE_API_URL=https://football-training-assistant.onrender.com/api npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: training-app/dist
          name: github-pages-${{ github.run_id }}

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}