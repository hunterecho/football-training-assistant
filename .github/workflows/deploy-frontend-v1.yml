name: Deploy Frontend v1.0 to Render

on:
  push:
    branches: [v1.0]
    paths:
      - 'training-app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: training-app/package-lock.json

      - name: Install dependencies
        run: cd training-app && npm ci

      - name: Build for v1.0
        run: cd training-app && VITE_DEPLOY_TARGET=gh-pages VITE_API_URL=https://football-training-assistant-v1.onrender.com/api npm run build

      - name: Copy index.html to 404.html for SPA routing
        run: cd training-app && cp dist/index.html dist/404.html

      - name: Install Render CLI
        run: curl -sL https://render.com/download/render-cli.sh | sh

      - name: Deploy to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          render deploy static \
            --service-name football-training-assistant-frontend-v1 \
            --region virginia \
            --branch v1.0 \
            --publish-dir training-app/dist
